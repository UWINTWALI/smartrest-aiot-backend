name: Docker Hub CI/CD for SmartRest API

on:
  push:
    branches:
      - develop
      - production
  pull_request:
    branches:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: smartrest_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      # Check out the repository
      - name: Checkout code
        uses: actions/checkout@v3      # Set up PHP 8.2
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      # Copy environment file
      - name: Copy environment file
        run: cp .env.example .env

      # Set CI environment variables
      - name: Set CI environment variables
        run: |
          echo "APP_ENV=testing" >> .env
          echo "DB_CONNECTION=pgsql" >> .env
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_DATABASE=smartrest_test" >> .env
          echo "DB_USERNAME=postgres" >> .env
          echo "DB_PASSWORD=postgres" >> .env

      # Generate application key
      - name: Generate application key
        run: php artisan key:generate      # Install dependencies
      - name: Install Composer Dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader

      # Run database migrations
      - name: Run database migrations
        run: php artisan migrate --force

      # Debug: List backend directory
      - name: List backend directory
        run: ls -l

      # Run tests (optional, uncomment if you want tests)
      # - name: Run Tests
      #   run: php artisan test

      # Save the build artifact for the next job
      - name: Save build artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartRest-backend
          path: .

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Check out the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Download the build artifact from the previous job
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: smartRest-backend
          path: backend

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/smartRest-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/smartRest-backend:${{ github.sha }}
